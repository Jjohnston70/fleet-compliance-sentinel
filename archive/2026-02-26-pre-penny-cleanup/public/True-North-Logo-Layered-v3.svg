<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 500 580" 
     width="500" 
     height="580">
  
  <defs>
    <style type="text/css">
      .navy-dark { fill: #1a3a5c; }
      .teal-mid { fill: #3d8eb9; }
      .teal-light { fill: #5ba3c8; }
      
      .text-truenorth {
        font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        fill: #1a3a5c;
      }
      .text-datastrategies {
        font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 600;
        fill: #3d8eb9;
        letter-spacing: 3px;
      }
      .text-tagline {
        font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 500;
        font-style: italic;
        fill: #3d8eb9;
        letter-spacing: 2px;
      }
    </style>
  </defs>
  
  <!-- LAYER: Background -->
  <g id="Background">
    <rect x="0" y="0" width="500" height="580" fill="#ffffff"/>
  </g>
  
  <!-- LAYER: Compass Assembly -->
  <g id="Compass-Rose" transform="translate(250, 190)">
    
    <!-- Outer Ring - complete circle -->
    <g id="Outer-Ring">
      <circle cx="0" cy="0" r="155" stroke="#3d8eb9" stroke-width="3" fill="none"/>
    </g>
    
    <!-- Inner decorative ring -->
    <g id="Inner-Ring">
      <circle cx="0" cy="0" r="125" stroke="#3d8eb9" stroke-width="1.5" fill="none"/>
    </g>
    
    <!-- Tick Marks between inner and outer ring -->
    <g id="Tick-Marks">
      <!-- Major ticks (at 30 degree intervals, skip cardinals at 0, 90, 180, 270) -->
      <g stroke="#3d8eb9" stroke-width="1.5">
        <line x1="0" y1="-128" x2="0" y2="-150" transform="rotate(30)"/>
        <line x1="0" y1="-128" x2="0" y2="-150" transform="rotate(60)"/>
        <line x1="0" y1="-128" x2="0" y2="-150" transform="rotate(120)"/>
        <line x1="0" y1="-128" x2="0" y2="-150" transform="rotate(150)"/>
        <line x1="0" y1="-128" x2="0" y2="-150" transform="rotate(210)"/>
        <line x1="0" y1="-128" x2="0" y2="-150" transform="rotate(240)"/>
        <line x1="0" y1="-128" x2="0" y2="-150" transform="rotate(300)"/>
        <line x1="0" y1="-128" x2="0" y2="-150" transform="rotate(330)"/>
      </g>
      
      <!-- Minor ticks (every 10 degrees, skip cardinals and major ticks) -->
      <g stroke="#3d8eb9" stroke-width="1">
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(10)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(20)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(40)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(50)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(70)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(80)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(100)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(110)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(130)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(140)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(160)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(170)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(190)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(200)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(220)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(230)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(250)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(260)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(280)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(290)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(310)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(320)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(340)"/>
        <line x1="0" y1="-128" x2="0" y2="-140" transform="rotate(350)"/>
      </g>
    </g>
    
    <!-- Cardinal Letters - positioned between inner and outer rings -->
    <g id="Cardinal-Letters">
      <!-- N at top, centered between rings (ring band is 125-155, so center ~140) -->
      <text x="0" y="-136" text-anchor="middle" dominant-baseline="middle" font-family="'Montserrat', sans-serif" font-weight="700" font-size="22" fill="#1a3a5c">N</text>
      <!-- S at bottom -->
      <text x="0" y="142" text-anchor="middle" dominant-baseline="middle" font-family="'Montserrat', sans-serif" font-weight="700" font-size="22" fill="#1a3a5c">S</text>
      <!-- E at right -->
      <text x="140" y="2" text-anchor="middle" dominant-baseline="middle" font-family="'Montserrat', sans-serif" font-weight="700" font-size="22" fill="#1a3a5c">E</text>
      <!-- W at left -->
      <text x="-140" y="2" text-anchor="middle" dominant-baseline="middle" font-family="'Montserrat', sans-serif" font-weight="700" font-size="22" fill="#1a3a5c">W</text>
    </g>
    
    <!-- 8-Point Star - Two-Tone Cardinal Points -->
    <g id="Star-Cardinal-Points">
      
      <!-- NORTH point - two halves -->
      <g id="North-Point">
        <polygon points="0,-115 -20,-10 0,0" class="navy-dark"/>
        <polygon points="0,-115 20,-10 0,0" class="teal-mid"/>
      </g>
      
      <!-- SOUTH point - two halves -->
      <g id="South-Point">
        <polygon points="0,115 -20,10 0,0" class="teal-mid"/>
        <polygon points="0,115 20,10 0,0" class="navy-dark"/>
      </g>
      
      <!-- EAST point - two halves -->
      <g id="East-Point">
        <polygon points="115,0 10,-20 0,0" class="navy-dark"/>
        <polygon points="115,0 10,20 0,0" class="teal-mid"/>
      </g>
      
      <!-- WEST point - two halves -->
      <g id="West-Point">
        <polygon points="-115,0 -10,-20 0,0" class="teal-mid"/>
        <polygon points="-115,0 -10,20 0,0" class="navy-dark"/>
      </g>
      
    </g>
    
    <!-- 8-Point Star - Two-Tone Intercardinal Points -->
    <g id="Star-Intercardinal-Points">
      
      <!-- NORTHEAST point -->
      <g id="NE-Point">
        <polygon points="70,-70 5,-18 0,0" class="navy-dark"/>
        <polygon points="70,-70 18,-5 0,0" class="teal-light"/>
      </g>
      
      <!-- SOUTHEAST point -->
      <g id="SE-Point">
        <polygon points="70,70 18,5 0,0" class="navy-dark"/>
        <polygon points="70,70 5,18 0,0" class="teal-light"/>
      </g>
      
      <!-- SOUTHWEST point -->
      <g id="SW-Point">
        <polygon points="-70,70 -5,18 0,0" class="navy-dark"/>
        <polygon points="-70,70 -18,5 0,0" class="teal-light"/>
      </g>
      
      <!-- NORTHWEST point -->
      <g id="NW-Point">
        <polygon points="-70,-70 -18,-5 0,0" class="navy-dark"/>
        <polygon points="-70,-70 -5,-18 0,0" class="teal-light"/>
      </g>
      
    </g>
    
    <!-- Center Circle Assembly -->
    <g id="Center-Circle">
      <!-- Outer teal ring -->
      <circle cx="0" cy="0" r="30" fill="#3d8eb9"/>
      <!-- White ring -->
      <circle cx="0" cy="0" r="24" fill="#ffffff"/>
      <!-- Inner navy circle -->
      <circle cx="0" cy="0" r="20" fill="#1a3a5c"/>
      
      <!-- Center 8-point star decoration -->
      <g id="Center-Star" fill="#ffffff">
        <polygon points="0,-12 3,-4 12,-4 5,1 7,10 0,5 -7,10 -5,1 -12,-4 -3,-4" transform="scale(0.6)"/>
      </g>
    </g>
    
  </g>
  
  <!-- LAYER: Text - TRUE NORTH -->
  <g id="Text-TrueNorth">
    <text x="250" y="435" text-anchor="middle" class="text-truenorth" font-size="52">TRUE NORTH</text>
  </g>
  
  <!-- LAYER: Text - DATA STRATEGIES with decorative lines -->
  <g id="Text-DataStrategies">
    <!-- Left decorative line -->
    <line x1="50" y1="468" x2="118" y2="468" stroke="#3d8eb9" stroke-width="2"/>
    
    <text x="250" y="475" text-anchor="middle" class="text-datastrategies" font-size="22">DATA STRATEGIES</text>
    
    <!-- Right decorative line -->
    <line x1="382" y1="468" x2="450" y2="468" stroke="#3d8eb9" stroke-width="2"/>
  </g>
  
  <!-- LAYER: Text - Tagline -->
  <g id="Text-Tagline">
    <text x="250" y="525" text-anchor="middle" class="text-tagline" font-size="18">TURNING DATA INTO DIRECTION</text>
  </g>
  
</svg>